<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热阻值 (R值) 演示</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>热阻值 (R值) 演示</h1>
    </header>

    <main>
        <section id="circuit-display">
            <svg id="thermal-resistance-svg" width="600" height="400"></svg>
        </section>

        <section id="explanation">
            <h2>热阻值 (R值) 说明</h2>
            <p id="text-description">
                热阻值（R值）是评估材料在热传导过程中隔热性能的一个重要指标。R值越高，意味着材料对热的隔离能力越强。计算公式为：
            </p>
        </section>

        <section id="formula">
            <h2>公式</h2>
            <p id="thermal-resistance-formula">
                <b>R = ΔT / Q</b><br>
                其中，ΔT 为温差，Q 为热流量。
            </p>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
